<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to Drawing Steps</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Image to 20-Step Drawing Guide</h1>
    
    <div class="upload-section">
      <input type="file" id="imageInput" accept="image/*">
      <button id="generateBtn">Generate Steps</button>
    </div>

    <div id="stepsContainer" class="steps-container">
      <!-- Generated steps will appear here -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
